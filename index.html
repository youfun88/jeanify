    <h3>What areas of San Diego do you focus on?</h3>
    <p>The coastal corridor — La Jolla, Bird Rock, Pacific Beach, Mission Beach, Point Loma, Del Mar — plus the inner urban neighborhoods of Mission Hills, Hillcrest, North Park and South Park, and the North County master-planned communities: Carmel Valley, Pacific Highlands Ranch, 4S Ranch, Del Sur, Carlsbad and Rancho Santa Fe.</p>
